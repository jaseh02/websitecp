<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Favorites</title>
  <style>
    body {
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      background: url('productbg.jpg') no-repeat center center fixed;
      background-size: cover;
      padding: 2rem;
      margin: 0;
    }

    h1 {
      text-align: center;
      color: #e84393;
      margin-bottom: 2rem;
    }

    #favoritesItems {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
      justify-content: center;
    }

    .item-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #fff;
      padding: 1rem;
      border-radius: 10px;
      box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1);
      width: calc(50% - 1.5rem);
    }

    .item-card img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
    }

    .item-info {
      flex: 1;
    }

    .item-info h3 {
      margin-bottom: 0.5rem;
      font-size: 1.6rem;
    }

    .item-info p {
      font-size: 1.4rem;
      color: #e84393;
      font-weight: bold;
    }

    .remove-btn, .action-btn {
      background: #e84393;
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      cursor: pointer;
    }

    .remove-btn:hover, .action-btn:hover {
      background: #333;
    }

    #totalContainer {
      max-width: 1200px;
      margin: 2rem auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #total {
      font-size: 1.8rem;
      font-weight: bold;
      color: #e84393;
    }

    .back-btn {
      display: block;
      margin: 2rem auto;
      text-align: center;
      background: #333;
      color: #fff;
      padding: 1rem 2rem;
      border-radius: 5rem;
      text-decoration: none;
    }

    .back-btn:hover {
      background: #e84393;
    }

    @media (max-width: 900px) {
      .item-card {
        width: calc(100% - 1.5rem);
      }
    }
  </style>
</head>
<body>
  <h1>My Favorites</h1>

  <div id="favoritesItems"></div>

  <div id="totalContainer">
    <p id="total">Total Items: 0</p>
    <button id="addAllToCart" class="action-btn">Add All to Cart</button>
  </div>

  <a href="cart.html" class="back-btn">Go to Cart</a>

  <script>
    // Load favorites from localStorage
    let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    const containerFav = document.getElementById("favoritesItems");
    const totalEl = document.getElementById("total");
    const addAllBtn = document.getElementById("addAllToCart");

    // Render favorites
    function renderFavorites() {
      containerFav.innerHTML = "";

      if(favorites.length === 0){
        containerFav.innerHTML = "<p style='text-align:center; font-size:1.5rem;'>No favorite items yet.</p>";
        totalEl.textContent = "Total Items: 0";
        return;
      }

      favorites.forEach((item, index) => {
        const div = document.createElement("div");
        div.classList.add("item-card");

        div.innerHTML = `
          <img src="${item.img}" alt="${item.name}">
          <div class="item-info">
            <h3>${item.name}</h3>
            <p>${item.price}</p>
          </div>
          <button class="remove-btn" onclick="removeFav(${index})">Remove</button>
        `;

        containerFav.appendChild(div);
      });

      totalEl.textContent = `Total Items: ${favorites.length}`;
    }

    // Remove a favorite item
    function removeFav(index) {
      favorites.splice(index, 1);
      localStorage.setItem("favorites", JSON.stringify(favorites));
      renderFavorites();
    }

    // Add all favorites to cart
    addAllBtn.addEventListener("click", () => {
      if(favorites.length === 0) return alert("No favorites to add!");
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart = cart.concat(favorites);
      localStorage.setItem("cart", JSON.stringify(cart));

      favorites = [];
      localStorage.setItem("favorites", JSON.stringify(favorites));
      renderFavorites();

      alert("All favorites added to cart!");
    });

    renderFavorites();
  </script>
</body>
</html>
