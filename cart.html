<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Crafty Blooms</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
<style>
  body {
    font-family: Verdana, Geneva, Tahoma, sans-serif;
    background: url('productbg.jpg') no-repeat center center fixed;
    background-size: cover;
    padding: 2rem;
    margin: 0;
  }

  h1 {
    text-align: center;
    color: #e84393;
    margin-bottom: 2rem;
  }

  #cartItems {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    max-width: 1200px;
    margin: 0 auto;
    justify-content: center;
  }

  .item-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: #fff;
    padding: 1rem;
    border-radius: 10px;
    box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1);
    width: calc(50% - 1.5rem);
  }

  .item-card img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 10px;
  }

  .item-info {
    flex: 1;
  }

  .item-info h3 {
    margin-bottom: 0.5rem;
    font-size: 1.6rem;
  }

  .item-info p {
    font-size: 1.4rem;
    color: #e84393;
    font-weight: bold;
  }

  .remove-btn {
    background: #e84393;
    color: #fff;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 5px;
    cursor: pointer;
  }

  .remove-btn:hover {
    background: #333;
  }

  #totalContainer {
    max-width: 1200px;
    margin: 2rem auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #total {
    font-size: 1.8rem;
    font-weight: bold;
    color: #e84393;
  }

  #checkoutBtn {
    background: #e84393;
    color: #fff;
    border: none;
    padding: 1rem 2rem;
    font-size: 1.6rem;
    border-radius: 5rem;
    cursor: pointer;
  }

  #checkoutBtn:hover {
    background: #333;
  }

  .back-btn {
    display: block;
    margin: 2rem auto;
    text-align: center;
    background: #333;
    color: #fff;
    padding: 1rem 2rem;
    border-radius: 5rem;
    text-decoration: none;
    font-size: 1.6rem;
  }

  .back-btn:hover {
    background: #e84393;
  }

  @media (max-width: 900px) {
    .item-card {
      width: calc(100% - 1.5rem);
    }
  }
</style>
</head>
<body>

<h1>My Cart</h1>

<div id="cartItems"></div>

<div id="totalContainer">
  <p id="total">Total: ₱0.00</p>
  <button id="checkoutBtn">Checkout</button>
</div>

<a href="index.html" class="back-btn">Back to Shop</a>

<script>
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const container = document.getElementById("cartItems");
  const totalEl = document.getElementById("total");
  const checkoutBtn = document.getElementById("checkoutBtn");

  function renderCart() {
    container.innerHTML = "";
    let total = 0;

    if(cart.length === 0){
      container.innerHTML = "<p style='text-align:center; font-size:1.5rem;'>Your cart is empty.</p>";
      totalEl.textContent = "Total: ₱0.00";
      checkoutBtn.disabled = true;
      checkoutBtn.style.opacity = 0.5;
      return;
    } else {
      checkoutBtn.disabled = false;
      checkoutBtn.style.opacity = 1;
    }

    cart.forEach((item, index) => {
      const div = document.createElement("div");
      div.classList.add("item-card");

      div.innerHTML = `
        <img src="${item.img}" alt="${item.name}">
        <div class="item-info">
          <h3>${item.name}</h3>
          <p>${item.price}</p>
        </div>
        <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
      `;

      container.appendChild(div);

      const priceNum = parseFloat(item.price.replace(/[^0-9.-]+/g,""));
      total += priceNum;
    });

    totalEl.textContent = "Total: ₱" + total.toFixed(2);
  }

  function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
  }

  checkoutBtn.addEventListener("click", () => {
    if(cart.length === 0) return alert("Your cart is empty!");
    alert("Checkout successful! Thank you for your purchase.");
    cart = [];
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
  });

  renderCart();
</script>

</body>
</html>
