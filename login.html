<!DOCTYPE html>  <html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">  
    <link rel="stylesheet" href="styles.css">  
    <title>Crafty Blooms</title>  
</head>  
<body>  
  <h1 class="logo">Crafty Blooms</h1>  
    <div class="container" id="container">  <div class="form-container sign-up">  
        <form>  
            <h1>Create <span>Account</span></h1>  
             <div class="social-icons">  
<a href="https://accounts.google.com/" target="_blank" class="icon">  
    <i class="fa-brands fa-google"></i>  
</a>  
<a href="https://www.facebook.com/" target="_blank" class="icon" id="fb-icon">  
    <i class="fa-brands fa-facebook-f"></i>  
</a>  
<a href="https://www.instagram.com/yourusername/" target="_blank" class="icon" id="ig-icon">  
    <i class="fa-brands fa-instagram"></i>  
</a>  
<a href="https://www.tiktok.com/" target="_blank" class="icon" id="tt-icon">  
    <i class="fa-brands fa-tiktok"></i>  
</a>

</div>  
                <span>Or use your email registration</span>  
                <input type="email" placeholder="Email" required>  
                 <input type="text" placeholder="Username" required>  
                <input type="password" placeholder="Password" required>  
              <button id="signUpBtn">Sign Up</button>  
            </form>  
        </div>  <div class="form-container sign-in">  
        <form>  
   <h1>Log In</h1>  
 <div class="social-icons">  
<a href="https://accounts.google.com/" target="_blank" class="icon">  
    <i class="fa-brands fa-google"></i>  
</a>  
<a href="https://www.facebook.com/" target="_blank" class="icon" id="fb-icon">  
    <i class="fa-brands fa-facebook-f"></i>  
</a>  
<a href="https://www.instagram.com/yourusername/" target="_blank" class="icon" id="ig-icon">  
    <i class="fa-brands fa-instagram"></i>  
</a>  
<a href="https://www.tiktok.com/" target="_blank" class="icon" id="tt-icon">  
    <i class="fa-brands fa-tiktok"></i>  
</a>

</div>  
                <span>or use your email password</span>  
                <input type="email" placeholder="Username" required>  
                <input type="password" placeholder="Password" required>  
                <a href="#">Forgot Your Password?</a>  
               <button id="signInBtn">Log In</button>  
            </form>  
        </div>  <div class="toggle-container">  
        <div class="toggle">  
            <div class="toggle-panel toggle-left">  
                <h1>Welcome Back!</h1>  
                <p>Enter your personal details to use all of Crafty Blooms features</p>  
                <button class="hidden" id="login">Log In</button>  
            </div>  
            <div class="toggle-panel toggle-right">  
                <h1>Hello, Friend!</h1>  
                <p>Register your personal details to use all of Crafty Blooms features</p>  
                <button class="hidden" id="register">Sign Up</button>  
            </div>  
        </div>  
    </div>  

</div>

   <script>  
const container = document.getElementById('container');  
const registerBtn = document.getElementById('register');  
const loginBtn = document.getElementById('login');  
  
registerBtn.addEventListener('click', () =>{  
    container.classList.add("active");  
});  
  
loginBtn.addEventListener('click', () =>{  
    container.classList.remove("active");  
});  
  
  
// LOGIN
document.querySelector('.sign-in form').addEventListener("submit", function(e){
    if(!this.checkValidity()){
        return;
    }

    e.preventDefault();
    window.location.href = "index.html";
});

// SIGN UP
document.querySelector('.sign-up form').addEventListener("submit", function(e){
    if(!this.checkValidity()){
        return;
    }

    e.preventDefault();
    alert("Sign up successful!");
    window.location.href = "index.html";
});
</script>  </body>  
</html>
